# Local hooks only (no network-fetched hook repos). Uses the project's own
# toolchain: uv-managed ruff for backend + e2e, npm-managed oxlint/tsc for
# the frontend. Install with: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (backend + e2e)
        entry: bash -c 'cd backend && uv run ruff check . ../e2e'
        language: system
        types: [python]
        pass_filenames: false

      - id: oxlint
        name: oxlint (frontend)
        entry: bash -c 'cd frontend && npx oxlint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: tsc
        name: tsc --noEmit (frontend)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
